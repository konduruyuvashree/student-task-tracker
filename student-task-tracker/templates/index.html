<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTrack — Student Task Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left">
        <span class="logo">📚 StudyTrack</span>
        <span class="tagline">Your academic command center</span>
    </div>
    <div class="nav-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
    </div>
</nav>

<!-- HERO STATS BAR -->
<div class="stats-bar" id="statsBar">
    <div class="stat-card">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total Tasks</span>
    </div>
    <div class="stat-card">
        <span class="stat-num pending" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
    </div>
    <div class="stat-card">
        <span class="stat-num done" id="doneCount">0</span>
        <span class="stat-label">Completed</span>
    </div>
    <div class="stat-card">
        <span class="stat-num urgent" id="urgentCount">0</span>
        <span class="stat-label">Due Today</span>
    </div>
</div>

<!-- MAIN CONTENT -->
<main class="main-content">

    <!-- ADD TASK PANEL -->
    <section class="panel add-panel">
        <h2 class="panel-title">➕ Add New Task</h2>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Task Title</label>
                <input type="text" id="taskTitle" placeholder="e.g. Complete CAO Assignment" />
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="taskSubject" placeholder="e.g. CAO, FOAIML, MAT..." />
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="taskDeadline" />
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="High">🔴 High</option>
                    <option value="Medium" selected>🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatus">
                    <option value="Pending">⏳ Pending</option>
                    <option value="In Progress">🔄 In Progress</option>
                    <option value="Completed">✅ Completed</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" id="addTaskBtn">Add Task</button>
    </section>

    <!-- FILTER BAR -->
    <section class="filter-bar">
        <div class="filter-group">
            <label>Filter by Subject</label>
            <select id="filterSubject">
                <option value="">All Subjects</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Filter by Status</label>
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="Pending">⏳ Pending</option>
                <option value="In Progress">🔄 In Progress</option>
                <option value="Completed">✅ Completed</option>
            </select>
        </div>
        <button class="btn-ghost" id="applyFilter">Apply Filter</button>
        <button class="btn-ghost" id="clearFilter">Clear</button>
    </section>

    <!-- DEADLINE REMINDER BANNER -->
    <div class="reminder-banner" id="reminderBanner" style="display:none;">
        <span id="reminderText"></span>
        <button onclick="document.getElementById('reminderBanner').style.display='none'">✕</button>
    </div>

    <!-- TASKS LIST -->
    <section class="panel tasks-panel">
        <h2 class="panel-title">📋 Your Tasks</h2>
        <div class="task-list" id="taskList">
            <div class="empty-state" id="emptyState">
                <p>🎉 No tasks yet! Add your first task above.</p>
            </div>
        </div>
    </section>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal">
        <h3>✏️ Edit Task</h3>
        <input type="hidden" id="editId" />
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Task Title</label>
                <input type="text" id="editTitle" />
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="editSubject" />
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="editDeadline" />
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="editPriority">
                    <option value="High">🔴 High</option>
                    <option value="Medium">🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus">
                    <option value="Pending">⏳ Pending</option>
                    <option value="In Progress">🔄 In Progress</option>
                    <option value="Completed">✅ Completed</option>
                </select>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-primary" id="saveEditBtn">Save Changes</button>
            <button class="btn-ghost" id="cancelEditBtn">Cancel</button>
        </div>
    </div>
</div>

<footer class="footer">
    <p>StudyTrack · Team 3 · Amity University Bengaluru · 2026</p>
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
